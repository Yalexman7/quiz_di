<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Quiz Diseño de Interfaces</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.container{max-width:800px;width:100%;padding:20px}
.card{background:#1e293b;border-radius:12px;padding:20px}
button{display:block;width:100%;margin:8px 0;padding:12px;border:none;border-radius:8px;background:#334155;color:white;cursor:pointer}
button:hover{background:#475569}
.correct{background:#22c55e}
.wrong{background:#ef4444}
</style>
</head>

<body>
<div class="container">
<div class="card">
<h2 id="question"></h2>
<div id="options"></div>
<p id="feedback"></p>
<button onclick="next()">Siguiente</button>
</div>
</div>

<script>
const quiz = [
{q:"¿Qué decisión refleja mejor un diseño adaptado a móvil en una interfaz responsiva?",opts:["Mantener todo en horizontal","Simplificar con menú hamburguesa y una sola columna","Reducir tamaños sin cambiar estructura","Eliminar imágenes"],correct:1},
{q:"¿Qué elemento mejora la experiencia en un mapa de navegación de ecommerce?",opts:["Menús redundantes","Ocultar categorías","Priorizar búsqueda, cuenta y carrito","Eliminar iconos"],correct:2},
{q:"¿Principal problema de los estilos en línea?",opts:["No permiten color","Tienen menos prioridad","Dificultan mantenimiento","No funcionan en navegadores"],correct:2},
{q:"¿Para qué sirve media='print'?",opts:["Animaciones en impresión","Optimizar carga","Adaptar contenido para papel","Controlar JS"],correct:2},
{q:"¿Para qué sirve el atributo alt?",opts:["Mejorar resolución","Acelerar carga","Accesibilidad","Hacer funcionar CSS"],correct:2},
{q:"¿Qué hace loading='lazy'?",opts:["Mejora diseño","Activa animaciones","Carga imágenes solo cuando se necesitan","Aumenta calidad"],correct:2},
{q:"¿Función de controls en audio?",opts:["Editar audio","Auto reproducir","Mostrar controles","Mejorar sonido"],correct:2},
{q:"Ventaja de transformaciones CSS?",opts:["Más complejas","Más fluidas y eficientes","Solo SVG","Sustituyen JS"],correct:1},
{q:"Clave para sincronizar audio y animación?",opts:["Reducir duración","Reiniciar audio","Eliminar CSS","Solo scroll"],correct:1},
{q:"¿Qué atributo mejora accesibilidad en formularios?",opts:["class","style","aria-label","id"],correct:2},
{q:"¿Por qué usar contenedor 16:9 en vídeo?",opts:["Reducir tamaño","Mantener proporción","Mejorar calidad","Activar controles"],correct:1},
{q:"Si no se puede usar teclado, ¿qué principio WCAG falla?",opts:["Perceptible","Operable","Comprensible","Robusto"],correct:1},
{q:"Sin confirmación tras enviar formulario, ¿qué falla?",opts:["Flexibilidad","Visibilidad del estado","Prevención errores","Diseño"],correct:1},
{q:"¿Qué mejora la arquitectura de la información?",opts:["Todo en una página","Categorías organizadas","Sin menú","Solo texto"],correct:1},
{q:"¿Qué aumenta la conversión en landing page?",opts:["Muchos enlaces","CTA claros y visibles","Formulario oculto","Bajo contraste"],correct:1}
];

let current = 0;
let score = 0;

function loadQuestion(){
const q = quiz[current];
document.getElementById("question").innerText = q.q;
const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";
document.getElementById("feedback").innerText="";

q.opts.forEach((opt,i)=>{
const btn = document.createElement("button");
btn.innerText = opt;
btn.onclick = ()=>select(btn,i);
optionsDiv.appendChild(btn);
});
}

function select(btn,i){
const correct = quiz[current].correct;
const buttons = document.querySelectorAll("#options button");

buttons.forEach((b,idx)=>{
b.disabled = true;
if(idx===correct) b.classList.add("correct");
if(idx===i && idx!==correct) b.classList.add("wrong");
});

if(i===correct){
score++;
document.getElementById("feedback").innerText="Correcto";
}else{
document.getElementById("feedback").innerText="Incorrecto";
}
}

function next(){
current++;
if(current>=quiz.length){
document.getElementById("question").innerText="Resultado final";
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerText=score+" / "+quiz.length;
return;
}
loadQuestion();
}

loadQuestion();
</script>
</body>
</html>
